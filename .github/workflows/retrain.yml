name: Retrain model

on:
  push: 
    branches: [main]

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run training
      run: python train.py

    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with: 
        name: wine-classifier-model
        path: mlartifacts/